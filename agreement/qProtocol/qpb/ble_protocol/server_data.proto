syntax = "proto3";
import "nanopb.proto";
import "fx_ble_msg.proto";

///请求服务器参数
message RequestPackage {
    string request_url = 1 [(nanopb).max_size = 128];
    RequestType request_type = 2;
    repeated RequestParam request_param = 3 [(nanopb).max_count = 3];
    oneof request_data {
        WifiInfo upload_wifi_info = 101;
        BrushingReport upload_brush_report = 102;
        SettingVO setting_vo = 103;
        ConnectPro upload_connect_pro = 104;
        OtaUpdateInfo upload_ota_info = 105;
        CustomButtonInfo upload_custom_button_info = 106;
        AudioDataInfoVO audio_info_vo = 107;
        RecommendInfo upload_recommend_info = 108;
        CustomPlanGroupInfoVO group_info_vo = 109;
        UserThemeInfoVO theme_info_vo = 110;
        UserGiftInfoVO gift_theme_info = 111;
        FileInfo file_info = 112;
        UsGiftDetailVO us_gift_detail_vo = 113;
        DeviceLog device_log = 114;
        SensorData sensor_data = 115;
        ProfessionalModelInfoVO professional_info_vo = 116;
        LightCustomInfoVO light_info_list_vo = 117;
        PushConfigVO push_config_vo = 118;
        EventTrackVO event_track_vo = 119;
    }
}

message SensorData {
    uint32 timestamp = 1;
    uint32 packet_total = 2;
    uint32 packet_index = 3;
    string md5 = 4 [(nanopb).max_size = 64];
    bytes data_block = 5;
}

///服务器返回数据
message ResponsePackage {
    bool flag = 1;
    uint32 code = 2;
    string message = 3 [(nanopb).max_size = 128];
    repeated ResponseParam response_param = 4 [(nanopb).max_count = 4];
    oneof response_data {
        WifiInfo get_wifi_info = 101;
        BrushingReport upload_brush_report = 102;
        SettingVO setting_vo = 103;
        ConnectPro upload_connect_pro = 104;
        OtaUpdateInfo upload_ota_info = 105;
        CustomButtonInfo upload_custom_button_info = 106;
        AudioDataInfoVO audio_info_vo = 107;
        RecommendInfo upload_recommend_info = 108;
        CustomPlanGroupInfoVO group_info_vo = 109;
        UserThemeInfoVO theme_info_vo = 110;
        UserGiftInfoVO gift_theme_info = 111;
        FileInfo file_info = 112;
        UsGiftDetailVO us_gift_detail_vo = 113;
        DeviceLog device_log = 114;
        SensorData sensor_data = 115;
        ProfessionalModelInfoVO professional_info_vo = 116;
        LightCustomInfoVO light_info_list_vo = 117;
        PushConfigVO push_config_vo = 118;
        EventTrackVO event_track_vo = 119;
        WifiInfo set_wifi_info = 121;
    }
}

message UsGiftDetailVO {
    repeated UsGiftDetail us_gift_detail_list = 1;
}

message UsGiftDetail {
    uint32 id = 1;
    string sender_meb_id = 2;
    string sender_nickname = 3;
    string receiver_phone = 4;
    uint32 model_id = 5;
    uint32 theme_detail_id = 6;
    uint32 status = 7;
    uint32 file_id = 8;
    uint32 create_time = 9;
    string gift_text = 10;
    uint32 gift_gif_file_id = 11;
    uint32 record_duration = 12;
}

message FileInfo {
    uint32 file_id = 1;
    string file_url = 2 [(nanopb).max_size = 256];
    uint32 file_size = 3;
    string file_md5 = 4 [(nanopb).max_size = 64];
}

message UserGiftInfoVO {
    repeated UserThemeInfo gift_info_list = 1 [(nanopb).max_count = 2];
    bool isGetGift = 2;
}

message UserThemeInfoVO {
    repeated UserThemeOption theme_info_list = 1 [(nanopb).max_count = 2];
}

message UserThemeOption {
    string name = 1 [(nanopb).max_size = 32];;
    UserThemeInfo user_theme_info = 2;
    string preview_img_file_url = 3 [(nanopb).max_size = 256];
    uint32 push_time = 4;
    string preview_gif_file_url = 5 [(nanopb).max_size = 256];
    repeated string file_url_list = 6 [(nanopb).max_size = 10];
    repeated string verbal_content_list = 7 [(nanopb).max_size = 10];
    SwitchState speech_state_switch = 8;
    SwitchState verbal_content_switch = 9;
}

message AudioDataInfoVO {
    repeated AudioDataOption audio_option_list = 1 [(nanopb).max_count = 2];
    repeated string tags = 2;
}

message AudioDataOption {
    string name = 1 [(nanopb).max_size = 64];
    AudioDataInfo audio_data_info = 2;
    string preview_file_url = 3 [(nanopb).max_size = 256];;
    string preview_img_file_url = 4 [(nanopb).max_size = 256];
    string tag = 5 [(nanopb).max_size = 20];
    uint32 sub_type = 6;
    string task_id = 7 [(nanopb).max_size = 10];
    string voice_id = 8 [(nanopb).max_size = 10];
}

message CustomPlanGroupInfoVO {
    repeated CustomGroupOption option_list = 1 [(nanopb).max_count = 5];
}

message CustomGroupOption {
    string name = 1 [(nanopb).max_size = 32];
    CustomPlanGroupInfo group_info = 2;
}

message SettingVO {
    repeated Setting setting_list = 1 [(nanopb).max_count = 3];
}

message Setting {
    uint32 setting_id = 1;
    uint32 push_state = 2;
    oneof setting_data {
        // Connect Service 0x10
        DeviceInfo get_device_info = 7;           // 0x0601、0x0602 ...
        DeviceRemind get_device_remind = 14;      // 0x0E10、0x0E11
        DeviceStateInfo device_state_set = 15;    // 0x0E03、0x0E04
        CustomButtonInfo get_custom_button_info = 17; // 0x11
        WifiInfo get_wifi_info = 19;                  // 0x13
        ProfessionalModelInfo get_professional_info = 20;

        // User Service 0x20
        UserThemeInfo  get_user_theme_info = 0x23;
        LightCustomInfo get_light_custom_info = 0x25;

        // Algorithm Service 0x30
        AlgorithmPro algorithm_pro = 0x31;

        // Video linkage service 0x40
        DeviceState get_device_state = 0x41; // 0x4110、0x4111
        AudioDataInfo get_audio_info = 0x46;
        AudioDataInfo get_music_info = 0x48;

        // Large file ota  0x50
        RotasFileStatusReq rota_file_status_req = 0x51;

        // Plan Service 0x70
        PlanInfo get_plan_info = 0x71;
        RecommendInfo get_recommend_info = 0x73;
        CustomPlanGroupInfo get_custom_group_info = 0x75;
    }
}

enum RequestType {
    GET = 0;
    POST = 1;
    PUT = 2;
    DELETE = 3;
    PATCH = 4;
}

message RequestParam {
    oneof request_param {
        string user_id = 1 [(nanopb).max_size = 64];
        string device_id = 2 [(nanopb).max_size = 64];
        uint32 connect_type = 3; // ConnectType
        string lang = 4;
        uint32 model_id = 5;
        uint32 protocol_id = 6;
        uint32 timestamp = 7;
        uint32 push_state = 8;
    }
}

message ResponseParam {
    oneof response_param {
        uint32 timestamp = 1;
        uint32 end_timestamp = 2;
    }
}

message OtaUpdateInfo {
    string device_id = 1 [(nanopb).max_size = 64];
    uint32 hardware_id = 2;
    uint32 model_id = 3;
    uint32 version_code = 4;
    uint32 version_type = 5;
    uint32 firmware_id = 6;
    uint32 version_code_min = 7;
    uint32 version_code_max = 8;
    repeated MetaData meta_data = 100 [(nanopb).max_count = 5];
}

message MetaData {
    uint32 version_type = 1;
    uint32 version_code = 2;
    string url = 3 [(nanopb).max_size = 128];
    string md5 = 4 [(nanopb).max_size = 64];
    uint32 size = 5;
}

message DeviceLog {
    uint32 model_id = 1;
    string log_info = 2 [(nanopb).max_size = 128];
}

message ProfessionalModelInfoVO {
    uint32 update_time = 1;
    repeated ProfessionalInfo professional_info_list = 2 [(nanopb).max_count = 2];;
}

message LightCustomInfoVO {
    repeated LightCustomOption light_info_list = 1 [(nanopb).max_count = 3];
}

message LightCustomOption {
    string light_name = 1 [(nanopb).max_size = 64];
    string pic_url = 2 [(nanopb).max_size = 128];
    LightCustomInfo light_custom_info = 3;
    uint32 push_time = 4;
}

message PushConfigVO {
    repeated PushConfig push_config_list = 1 [(nanopb).max_count = 3];
}

message PushConfig {
    uint32 push_time = 1;
    uint32 config_item_id = 2;
    oneof config_item_data {
        uint32 int_value = 100;
        string string_value = 101;
        bool bool_value = 102;
        SwitchState switch_value = 103;
    }
}

message EventTrackVO {
    repeated EventTrackInfo event_list = 1 [(nanopb).max_count = 6];
}

message EventTrackInfo {
    uint32 func_id = 1;
    uint32 event_id = 2;
    oneof data {
        uint32 run_times = 10;
    }
}
