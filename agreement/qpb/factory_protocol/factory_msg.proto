syntax = "proto3";
import "nanopb.proto";


enum FacErrorCode {
    NO_ERROR = 0x00;
    NO_SUPPORT = 0x01;
    NO_MEMORY = 0x02;
    GENERALLY = 0x03;
}

enum FactroyCmd {
    FIRST_COMMAND_NO_USE = 0x00;
    GET_DEVICE_BASE_INFO = 0x01;
    SET_DEVICE_STATE = 0x02;
    GET_DEVICE_STATE = 0x03;
    GET_PERIPH_STATE = 0x04;
    SET_DEVICE_INFO = 0x05;
    GET_DEVICE_INFO = 0x06;
    SET_DEVICE_BASE_INFO = 0x07;

    SET_COLLECT_PARAM = 0x10;
    GET_COLLECT_PARAM = 0x11;
    UPLOAD_PRESS_SENSOR = 0x13;
    UPLOAD_NINE_ALEX = 0x14;
    GET_BUTTON_STATE=0x15;
    UPLOAD_BUTTON_STATE=0x16;
    UPLOAD_MOTORCALI_DATA=0x17;
    UPLOAD_PICTURE_DATA=0x18;

    SET_PRESS_SENSOR_CALIB = 0x20;
    GET_PRESS_SENSOR_CALIB = 0x21;
    SET_IMU_CALIB = 0x22;
    GET_IMU_CALIB = 0x23;
    LED_CONTROL = 0x24;
    LCD_CONTROL = 0x25;
    MOTO_CONTROL = 0x26;
    BRUSH_CONTROL = 0x27;
    SET_TIME = 0x28;
    CAMERA_CONTROL = 0x29;

    SET_AGEING_TEST = 0x32;
    SET_BRUSH_RECORD = 0x33;
    WIFI_DEMAND = 0x34;
    FAC_LOG = 0x35;

    INTERNET_OTA = 0x40;
}

message FactoryDataPackage {
    FactroyCmd cmd_id = 1;
    oneof command_data {
        FacGetDevBaseInfo get_dev_base_info = 2;
        FacDevState set_dev_state = 3;
        FacDevState get_dev_state = 4;
        FacGetPeriphState get_periph_state = 5;
        FacDevInfo get_dev_info = 6;
        FacDevInfo set_dev_info = 7;
        FacSetDevBaseInfo set_dev_base_info = 0x08;

        FacCollectParam set_collect_param = 0x10;
        FacCollectParam get_collect_param = 0x11;
        FacUploadPresSensor press_sensor = 0x13;
        FacUploadNineAlex upload_nine_alex = 0x14;
        FacButtonState get_button_state=0x15;
        FacButtonState upload_button_state=0x16;
        FacMotorCalibResult upload_motorcali_data=0x17;
        FacPictureDataAck upload_picture_data=0x18;


        FacPreSensorCalibResult set_fsensor_calib = 0x20;
        FacPreSensorCalibResult get_fsensor_calib = 0x21;
        FacImuCalibResult set_imu_calib = 0x22;
        FacImuCalibResult get_imu_calib = 0x23;
        FacLedControl led_control = 0x24;
        FacLcdControl lcd_control = 0x25;
        FacMotoControl moto_control  = 0x26;
        FacBrushControl brush_control = 0x27;
        FacSetTime set_time = 0x28;
        FacCameraControl camera_control = 0x29;


        FacAgeingTest ageing = 0x32;
        FacSetBrushRecord set_brush_record = 0x33;
        FacWifiDemand wifi_demand = 0x34;
        FacBrushLog fac_log = 0x35;

        //ota
        FacInternetOta internet_ota = 0x40;
    }
}





/*********************设备基础信息区域******************/
enum FacProtoId {
    PROTOCOL_NONE = 0;
    V100 = 100;
    V101 = 101;
    V102 = 102;
    V103 = 103;
    V104 = 104;
    V105 = 105;
    V106 = 106;
}

message FacGetDevBaseInfo
{
    string product_name = 1 [(nanopb).max_size= 8];	 //string
    uint32 pb_phone_ver = 2;	 //string	
    FacProtoId pb_factory_ver = 3; //string
    string hw_version = 4 [(nanopb).max_size= 24];	//string	
    string soft_version = 5 [(nanopb).max_size= 24];	//string
    string res_version = 6 [(nanopb).max_size= 24];	//string
    string algo_version = 7 [(nanopb).max_size= 24];  //string
    string presure_version = 8 [(nanopb).max_size= 24];
    bytes ble_mac = 9 [(nanopb).max_size= 6];
    bytes wifi_mac = 10 [(nanopb).max_size= 6];
    uint32 imu_id = 11[(nanopb).max_size= 6];
    bool ageing_state = 12;
    string motor_version = 13 [(nanopb).max_size= 24];
    string ble_version = 14 [(nanopb).max_size= 24];	//string
    string camera_version = 15 [(nanopb).max_size= 24];	//string
    FacErrorCode result = 100;
}


enum FacBasInfoType
{
    PRODUCT_NAME = 0;
    PB_PHONE_VER = 1;
    PB_FACTORY_VER = 2;
    HW_VERSION = 3;
    SOFT_VERSION = 4;
    RES_VERSION = 5;
    ALGO_VERSION = 6;
    PRESURE_VERSION = 7;
    BLE_MAC = 8;
    WIFI_MAC = 9;
    IMU_ID = 10;
    AGEING_STATE = 11;
    MOTOR_VERSION = 12;
    BLE_VERSION = 13;
    CAMERA_VERSION = 14;
}

message FacSetDevBaseInfo {
    FacBasInfoType basinfo_item = 1;
    oneof value_item {
        string product_name = 2 [(nanopb).max_size= 8];	 //string
        uint32 pb_phone_ver = 3;	 //string	
        FacProtoId pb_factory_ver = 4; //string
        string hw_version = 5 [(nanopb).max_size= 24];	//string	
        string soft_version = 6 [(nanopb).max_size= 24];	//string
        string res_version = 7 [(nanopb).max_size= 24];	//string
        string algo_version = 8 [(nanopb).max_size= 24];  //string
        string presure_version = 9 [(nanopb).max_size= 24];
        bytes ble_mac = 10 [(nanopb).max_size= 6];
        bytes wifi_mac = 11 [(nanopb).max_size= 6];
        uint32 imu_id = 12[(nanopb).max_size= 6];
        bool ageing_state = 13;
        string motor_version = 14 [(nanopb).max_size= 24];
        string ble_version = 15 [(nanopb).max_size= 24];	//string
        string camera_version = 16 [(nanopb).max_size= 24];	//string

    }
}

/*********************设备基础信息区域******************/









/*********************设备状态设置区域******************/
enum DevStateType
{
    REBOOT = 0; //系统重启
    RESET = 1; //重置
    SLEEP = 2; //进入休眠
    FORBID_SLEEP = 3;//禁止休眠
    FACTORY_QRCORD = 4;//工厂模式
    SHIP = 5;//船运模式
    UART_RECEIVE = 6;//串口接收
    PRESS_SENSOR_TEMP = 7;//压感温度补偿开关
    MOTOR_ADC_MOS=8;//电机adc采集的mos

}

enum FacSwitch
{
    option allow_alias = true;
    STOP = 0;
    CLOSE = 0;
    START = 1;
    OPEN = 1;
}

message FacDevState
{
    DevStateType dev_state_type = 1;
    FacSwitch state = 2;
    FacErrorCode result = 100;
}
/*********************设备状态设置区域******************/








/*********************设备自定义信息区域******************/
enum FacDevInfoType
{
    WIFI_INFO = 0;
    TAIL_SN = 1;
    BOARD_SN = 2;
    BRUSH_MODE = 3;
    BATTERY_INFO = 4;
    IF_QUALIFIED = 5;//工厂测试结果
    SUB_PID = 6;
    SKUID = 7;
 
}

enum FacChargeStateType
{
    ERROR = 0;
    FULL = 1;
    CHARGING = 2;
    UNCHARGE = 3;
    NO_BATT = 4;
}



enum FacBatteryType
{
    TWO_BATTERY = 0;
    ONE_BATTERY = 1;
}



message FacBatteryInfo {
    FacChargeStateType charge_state = 1;
    uint32 voltage = 2;
    uint32 percent = 3;
    FacBatteryType  battery_type =4;


}

message FacWifiInfo {
    string wifi_name = 1 [(nanopb).max_size = 32];
    string wifi_password = 2 [(nanopb).max_size = 64];
    bytes ip_address = 3 [(nanopb).max_size =4];
    uint32 port = 4;
}



message FacDevInfoValue {
    FacDevInfoType info_item = 1;
    oneof value_item {
        FacWifiInfo wifi_info = 2;
        string tail_sn = 3 [(nanopb).max_size = 64];
        string board_sn = 4 [(nanopb).max_size = 64];
        uint32 brush_mode = 5;
        FacBatteryInfo battery = 6;
        FacSwitch if_qualified = 7;
        string sub_pid = 8 [(nanopb).max_size = 64];
        string sku_id = 9 [(nanopb).max_size = 64];
    
    }
     string  write_info= 50[(nanopb).max_size = 64];

}

message FacDevInfo
{
    repeated FacDevInfoValue dev_info = 1 [(nanopb).max_count = 5];
 
    FacErrorCode result = 100;
}
/*********************设备自定义信息区域******************/






/*********************wifi相关区域******************/
message FacWifiDemand
{
    float wifi_speed = 1;
    uint32 connect_command = 2;
    uint32 connect_result = 3;
    string ota_data = 4 [(nanopb).max_size= 50];
    FacWifiInfo wifi_info = 5;
    uint32 ota_result = 6;                  //没有用
    FacErrorCode result = 100;
}
/*********************wifi相关区域******************/






/*********************牙刷日志相关区域******************/
message FacBrushLog
{
    FacSwitch switch_send_log = 1;

    FacErrorCode result = 100;
}
/*********************牙刷日志相关区域******************/










/*********************设备状态区域******************/
message FacGetPeriphState
{
    bool imu_state = 1;	
    bool flash_state = 2;
    bool magnet_state = 3;
    bool press_state = 4;
    bool audio_state = 5;
    FacErrorCode result = 100;
}
/*********************设备状态区域******************/







/*********************老化类区域******************/
