/*********************屏幕测试类区域******************/
enum FacLcdControlType
{
    color = 0;
    reg = 1;
}

message FacRegisterConfig
{
    uint32 addr = 1;
    uint32 value = 2;
}

message FacLcdControl
{
    FacLcdControlType type = 1;
    oneof value_item {
        uint32 color = 2;
        FacRegisterConfig config = 3;
    }

    FacErrorCode result = 100;
}
/*********************屏幕测试类区域******************/






/*********************电机类区域******************/
enum FacMotoControlType
{
    motor_state = 0;
    motor_param = 1;
    play_file = 2;
    motor_cali=3;
    motor_test=4;
    damping_state=5;
    motor_cali_data=6;
    servo_param=7;   
    get_servo_info_data =8;

  
}

message FacMotoParam
{
    uint32 freq = 1;
    float gain_or_duty = 2;    
    uint32 volume = 3;
}

enum FacMotoState
{
	UGT_E_SS_IDLE_A				= 0;// 空闲任务A
	UGT_E_SS_INIT_B				= 1;//空闲任务B
	UGT_E_SS_STOP_C				= 2; 	//
	UGT_E_SS_START_D			= 3;//开始任务D
	UGT_E_SS_PRECHARGE_E 	    = 4; //预充任务E
	UGT_E_SS_TRACK_F			= 5;//追踪任务F
	UGT_E_SS_IDENTIFY_G		    = 6; 	//识别任务G
	UGT_E_SS_ALIGNMENT_H	    =	7; //定位任务H
	UGT_E_SS_OPENLOOP_I		    =	8;//开环任务I
	UGT_E_SS_CLOSEDLOOP_J	    = 9; //闭环任务J
	UGT_E_SS_BRAKE_K			= 10; //打断任务K
	UGT_E_SS_FAULT_L			= 11;//故障任务L
	UGT_E_SS_WAIT_M				= 12;//等待任务M
	UGT_E_SS_WRITE_FLASH	    = 13;//写入任务N

}
enum FacMotorFaultCode
{
    NoFault=0;                      //无故障
    OverVoltage=1;       	// 过压 
    UnderVoltage=2;                 // 欠压 
    OverCurrent=3;   			    // 软件过流
    HardOverCurrent=4;              // 硬件过流
    OverTempMotor=5;                // 电机过温
    Abnormal_working_current=6;     //工作状态电流达到饱和
    OverTempIGBT=7;				    // IPM过温
    StartupFail=8;				    // 启动失败
    StartupFailContious=9;	        // 连续启动失败
    OverLoad=10;       	            // 软件过载，降额运行
    OverWindSpeed=11;				// 超速
    LosePhase=12;                   //丢相
    OverIAs=13;                     //A相过流
    OverIBs=14;                     //B相过流
    OverICs=15;                     //C相过流
    OverIAsIBsICs=16;               //全相过流
    STOPMode=17;                    //停止模式
    MotorStall=18;   			    //堵转
  
}
enum CaliMark
{
    zer_hallzer_comple_flag=0;
    us_zer_comple_flag=1;
    hallzer_comple_flag=2;
    zer_hallzer_incomple_flag=3;

}

message ServoMotorInfo 
{
    FacMotoState motor_state = 1;
    FacMotorFaultCode FaultCode = 2;
    uint32 motor_current = 3;
    uint32 motor_voltage = 4;
    CaliMark  motor_cali_mark=5;
}


message ServoMotorParam
{
    float vibrate_angle = 1;
    uint32 sweeping_angle = 2;
    uint32 vibrate_freq = 3;
    float sweeping_freq = 4;
}
enum FacMotoCali 
{
        HALL_CALIBRATION = 0;
        ZERO_CALIBRATION = 1;
        MOTOR_CALI_START = 2;
        MOTOR_CALI_STOP = 3;
}

message FacMotoControl
{
    FacMotoControlType type = 1;
    oneof value_item {
        FacSwitch switch_state = 2;
        FacMotoParam param = 3;
        string file_name = 4 [(nanopb).max_size = 128];
        FacMotoCali switch_cali = 5;
        FacSwitch  motor_testing= 6;
        FacSwitch damping_switch= 7;
        uint32 motor_cali_result = 8;       //发送校准结果
        ServoMotorParam  servoparam =9;
        FacSwitch  get_servo_info =10; 

    
    }

    FacErrorCode result = 100;
}

enum FacMotorUploadType
{
    HALL_CALIBRATION_DATA = 0;
    ZERO_CALIBRATION_DATA = 1;
    MOTOR_LOG = 2;
    SERVO_INFO= 3;
}

message FacMotorCalibResult
{
    FacMotorUploadType type = 1;
    oneof value_item {
        uint32 hall_calibration_data= 2; 
        uint32 zero_calibration_data= 3;
        string motor_log = 4 [(nanopb).max_size= 128];
        ServoMotorInfo  servo_info = 5;      //获取校准参数

    }

    FacErrorCode result = 100;
}
/*********************电机类区域******************/







/*********************摄像头类区域******************/
enum FacCameraControlType
{
    camera_state = 0;
    camera_light = 1;
    camera_exposure_time = 2;
    camera_display_on_screen=3;
    camera_support_state=4;
    camera_get_picture=5;

}

message FacCameraControl
{
    FacCameraControlType type = 1;
    oneof value_item {
        FacSwitch camera_switch = 2;
        FacSwitch light_switch = 3;
        uint32  exposure_time = 4;
        FacSwitch display_on_screen = 5;
        FacSwitch camera_support = 6;
        FacSwitch get_picture = 7;
  

    }

    FacErrorCode result = 100;
}


message FacPictureDataAck
{
    FacErrorCode send_data_over = 1;
    repeated uint32 fault_data_packet = 2[(nanopb).max_count = 50];

    FacErrorCode result = 100;
}
/*********************摄像头类区域******************/







/*********************灯光类区域******************/
enum LedPosition
{
    led_left_up = 0;
    led_left_down = 1;
    led_right_up = 2;
    led_right_down = 3;
}
message FacLedColor
{
    LedPosition index = 1;
    uint32 R = 2;
    uint32 G = 3;
    uint32 B = 4;
}


message FacLedControl
{
    uint32 which_led = 1;
    FacSwitch switch_state = 2;
    repeated FacLedColor led_state = 3 [(nanopb).max_count = 8];
    FacErrorCode result = 100;
}
/*********************灯光类区域******************/








/*********************采集类区域******************/
enum DataCollectType
{
    BATTERY = 0;
    PRESSURE_SENSOR = 1;
    NINE_AXLE = 2;
    NINE_AXLE_SOLVE = 3;

}

enum FacBrushControlType
{
    BRUSH_START = 0;
    CHANGE_MODE = 1; 
}

message FacBrushControl
{
    FacBrushControlType type = 1;
    oneof value_item {
        FacSwitch brush_start = 2;
        uint32 change_mode = 3;
    }

    FacErrorCode result = 100;
}

message DataCollectParam
{
    FacSwitch state = 1;   
    uint32 sampling_count = 2;      //采样次数  0xFFFFFFFF不限次数
    uint32 sampling_rate = 3;       //采样率
    uint32 upload_rate = 4;         //上报频率
}

message FacDataCollectItem
{
    DataCollectType type = 1;
    oneof command_data {
        DataCollectParam bat_vol = 2;   //电池电压
        DataCollectParam pressure_sensor = 3; //压感 刷头压感+压感按键
        DataCollectParam nine_axle = 4;	      //9轴 地磁+IMU
        DataCollectParam nine_axle_solve = 5;	//处理过的9轴 地磁+IMU
    }
}

message FacCollectParam
{
    repeated FacDataCollectItem param = 2 [(nanopb).max_count = 8];
    FacErrorCode result = 100;
}
/*********************采集类区域******************/





/*********************按键类区域******************/
enum FacButtonType
{
    POWER_BUTTON = 0;
    MODEL_BUTTON = 1;
    PRESS_MECHANICAL = 2;
}

enum ButtonState
{
    NULL=0;
    PRESSED = 1;
    RELEASED = 2;
    HELD = 3;
}

message DataButtonParam
{
    FacSwitch state = 1;   
    ButtonState button_state_now = 2;	 //按键状态
}
message FacButtonItem 
{
    FacButtonType type = 1;
    oneof command_data {
        DataButtonParam power_button = 2;   
        DataButtonParam mode_button = 3; 
        DataButtonParam press_mechanical = 4;	     
    }
}

message FacButtonState
{
    repeated FacButtonItem  button_state = 2 [(nanopb).max_count = 8];
    FacErrorCode result = 100;
}
/*********************按键类区域******************/











/*********************六轴数据采集区域******************/
message NineAlexData
{
    uint32 timestamp = 1;
    uint32 acc_x = 2;
    uint32 acc_y = 3;
    uint32 acc_z = 4;
    uint32 gyro_x = 5;
    uint32 gyro_y = 6;
    uint32 gyro_z = 7;
    uint32 magnet_x = 8;
    uint32 magnet_y = 9;
    uint32 magnet_z = 10;

    float solve_acc_x = 12;
    float solve_acc_y = 13;
    float solve_acc_z = 14;
    float solve_gyro_x = 15;
    float solve_gyro_y = 16;
    float solve_gyro_z = 17;
    float solve_magn_x = 18;
    float solve_magn_y = 19;
    float solve_magn_z = 20;

}

message FacUploadNineAlex 
{
    repeated NineAlexData data = 2 [(nanopb).max_count = 15];
    FacErrorCode result = 100;
}
/*********************六轴数据采集区域******************/








/*********************压感的pb区域******************/
message PresurceSensorItem
{
    uint32 adc = 1;
    uint32 value = 2;
}

message PresurceSensorData
{
    uint32 timestamp = 1;
    uint32 temperature = 2;
    PresurceSensorItem brush_head = 3;
    PresurceSensorItem mode_button = 4;
    PresurceSensorItem power_button = 5;
}

message FacUploadPresSensor
{
    repeated PresurceSensorData sensor_data = 2 [(nanopb).max_count = 15];
    FacErrorCode result = 100;
}

message FacPreSensorCalibResult
{
    uint32 brush_head_adc = 1;    //uint16
    uint32 mode_button_adc = 2;   //uint16
    uint32 power_button_adc = 3;
    uint32 temperature = 4;

    FacErrorCode result = 100;
}
/*********************压感的pb区域******************/








/*********************六轴校准结果上报区域******************/
message AccCaliData
{
    float kx = 1;
    float ky = 2;
    float kz = 3;
    float syx = 4;
    float szx = 5;
    float szy = 6;
    float bx = 7;
    float by = 8;
    float bz = 9;
}


message FacImuCalibResult
{
    uint32 gyro_x = 1;
    uint32 gyro_y = 2;
    uint32 gyro_z = 3;
    uint32 acc_x = 4;
    uint32 acc_y = 5;
    uint32 acc_z = 6;   //原先静态的六轴校准
    AccCaliData  new_cali=7;//现在9个位置的六轴校准

    FacErrorCode result = 100;
}
/*********************六轴校准结果上报区域******************/




/*********************设置刷牙时间区域******************/

message FacSetTime
{
    uint32 timestamp = 1;
    uint32 timezone = 2;
}

/*********************设置刷牙时间区域******************/






/*********************设置刷牙结果区域******************/
message FacSetBrushRecord
{
    uint32 timestamp = 1;
    uint32 plaque = 2;	//菌斑
    bytes work_time = 3 [(nanopb).max_size= 24];
    bytes pressure_time = 4 [(nanopb).max_size= 12];
    bytes horizon_brush = 5 [(nanopb).max_size= 12];
}
/*********************设置刷牙结果区域******************/





/*********************配置wifi远程ota区域******************/

message FacOtaFileInfo 
{
    uint32 file_size = 1;
    uint32 version_code = 2;    //版本号
    uint32 version_type = 3;    //文件类型  201固件  202资源  303音频 304主题 305音乐文件
    string url = 4 [(nanopb).max_size= 256];
    string md5 = 5 [(nanopb).max_size= 64];
}

message FacInternetOta
{
    repeated FacOtaFileInfo file_info = 1 [(nanopb).max_count = 2];    
    FacErrorCode result = 100;
}
/*********************配置wifi远程ota区域******************/
