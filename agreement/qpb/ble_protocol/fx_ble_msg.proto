    SIX_MIN = 360;
}

enum ModelState {
    NORMAL_STATE = 0;
    NON_DELETABLE = 1;
    NON_MOVE = 2;
    NON_DELETABLE_MOVE = 3;
    NON_DISPLAY = 4;
}

enum BrushingModel {
