    repeated ProfessionalInfo professional_info_list = 2 [(nanopb).max_count = 1];
    SwitchState enter_debug_switch = 3;
    SwitchState facet_custom_switch = 4;
    ErrorCode setting_result = 100;
}

message ProfessionalInfo {
    CommonSide common_side = 1;
    float vibration_range = 2;
    float vibration_frequency = 3;
    float sweep_range = 4;
    float sweep_frequency = 5;
    uint32 param_index = 6;
	repeated BrushSide brush_side = 7 [(nanopb).max_count = 16];
}

message LanguageInfo {
    string language_code = 1 [(nanopb).max_size= 10];
    ErrorCode setting_result = 10;
}

message DisplaySettingInfo {
    repeated DisplayContent display_content = 1 [(nanopb).max_count = 5];
    ErrorCode setting_result = 10;
}

message DisplayContent {
    DisplayState display_state = 1;
    DisplayStyle display_style = 2;
}

//############################# 0x40 Audio/Video Linkage Service Start ###########################
message DeviceState {
    repeated DeviceValue state_value = 1 [(nanopb).max_count = 3];
    ErrorCode setting_result = 2;
}

message DeviceValue {
    DeviceItem item = 1;
    oneof value_item {
        uint32 is_trim = 2;
        NurseModel model = 3;
        NurseLevel level = 4;
        uint32 gesture = 5;
        RemindValue speed = 6;
        uint32 power = 7;
        Temperature temperature = 8;
        uint32 collagen = 9;
        uint32 methods_standard = 10;
        NurseLevel custom_ems_level_a = 11;
        NurseLevel custom_ems_level_b = 12;
        NurseLevel custom_ems_level_c = 13;
        DeviceUseState control_state = 14;
        FrequencyBand frequency_band = 15;
        uint32 current_frequency = 16;
        SwitchState music_model_switch = 17;
        SwitchState music_enjoy_model_switch = 18;
        AudioRemindType voice_guidance_type = 19;
    }
}

message FrequencyBand {
    uint32 min_frequency = 1; // 0.8MHz : 800 KMHz
    uint32 max_frequency = 2; // 2.45MHz: 2450KMHz
}

message Temperature {
    uint32 left_temperature = 1; // FACE, EYE, EMS
    uint32 right_temperature = 2; // EMS
}


message DeviceUp {
    DeviceUseState device_use_state = 1;
    uint32 device_use_time = 2;
    repeated DeviceValue up_value = 3 [(nanopb).max_count = 1];
}

message DeviceRemindInfo {
    repeated DeviceValue remind_value = 1 [(nanopb).max_count = 1];
}

message DeviceReport {
    uint32 report_count = 1;
    repeated VideoReportData report_data = 2 [(nanopb).max_count = 1];
}

message VideoReportData {
    uint32 timestamp = 1;
    uint32 device_face_duration = 2;
    uint32 device_eye_duration = 3;
    uint32 device_ems_duration = 4;
    uint32 device_face_collagen = 5;
    uint32 device_eye_collagen = 6;
    uint32 device_methods_standard = 7;
}

message AudioDataInfo {
    AudioRemindType use_remind_type = 2;
    uint32 speech_id = 3;
    uint32 file_id = 4;
    SwitchState music_conductor_switch = 5;
    uint32 play_mode = 6;
    uint32 timestamp = 7;
    ErrorCode setting_result = 100;
}

message AudioRemindData {
    repeated AudioRemindState remind_state = 1 [(nanopb).max_count = 8];
    uint32 open_count = 2;
    ErrorCode setting_result = 100;
}

message AudioRemindState {
    RemindType remind_type = 1;
    SwitchState remind_switch = 2;
    uint32 select_item = 3;
    oneof state_value {
        uint32 type_value = 10;
    }
}

//############################# 0x40 Audio/Video Linkage Service End #############################

//############################# 0x50 Large File ROTA Start #################################
message MultiFileStatusReq {
    repeated RotasFileStatusReq file_status_list = 1 [(nanopb).max_count = 2];
}

message RotasFileStatusReq {
    RotaFileStatus rotaStatus = 1;
    RotasUpdateFile fileType = 2;
    uint32 fileVersion = 3;
    uint32 fileSize = 4;
    uint32 packetNum = 5;
    uint32 packetSize = 6;
    uint32 packetIntervalRsp = 7;
    bytes file_md5 = 8 [(nanopb).max_size = 64];
    bytes file_zip_md5 = 9 [(nanopb).max_size = 64];
    uint32 fileUnzipSize = 10;
    uint32 fileWriteAddress = 11;
}

message RotasFileStatusRsp {
    RotasUpdateFile fileType = 1;
    RotaErrorCode result = 2;
    uint32 packetSize = 3;
}

message RotasDataReq {
    RotasUpdateFile fileType = 1;
    uint32 index = 2;
    bytes data = 3 [(nanopb).max_size= 240];
}

message RotasDataRsp {
    RotasUpdateFile fileType = 1;
    uint32 index = 2;
    RotaErrorCode result = 3;
    uint32 progress = 4;
}

message RotasResultReq {
    RotasUpdateFile fileType = 1;
    uint32 fileVersion = 2;
    RotaErrorCode rotaResult = 3;
    uint32 sub_error_code = 4;
}

message RotasResultRsp {
    RotasUpdateFile fileType = 1;
    RotaErrorCode result = 2;
    RotaFileStatus rotaStatus = 3;
}

message FileHandleInfo {
    RotasUpdateFile file_type = 1;
    RotaFileStatus file_state = 2;
}

//############################# 0x50 Large File ROTA End ###################################

