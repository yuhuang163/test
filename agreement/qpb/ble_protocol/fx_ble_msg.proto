//############################# 0x40 Audio/Video Linkage Service Start ###########################
message DeviceState {
    repeated DeviceValue state_value = 1 [(nanopb).max_count = 1];
    ErrorCode setting_result = 2;
}

enum DeviceItem {
    ALL = 0;
    IS_TRIM = 1;
    MODEL = 2;
    LEVEL = 3;
    GESTURE = 4;
    MOVE_SPEED = 5;
    POWER = 6;
    TEMPERATURE = 7;
    COLLAGEN = 8;
    METHODS_STANDARD = 9;
    CUSTOM_EMS_LEVEL_A = 10;
    CUSTOM_EMS_LEVEL_B = 11;
    CUSTOM_EMS_LEVEL_C = 12;
    CONTROL_STATE = 13;
    FREQUENCY_BAND = 14;
    CURRENT_FREQUENCY = 15;
    MUSIC_MODEL_SWITCH = 16;
}

enum NurseModel {
    CLOSE_MODEL = 0;
    FACE = 1;
    EYE = 2;
    EMS = 3;
    EMS_SINGLE_HEAD = 4;
}

enum NurseLevel {
    UNKNOWN_LEVEL = 0;
    ONE = 1;
    TWO = 2;
    THREE = 3;
    FOUR1 = 4;
    FIVE = 5;
}

message DeviceValue {
    DeviceItem item = 1;
    oneof value_item {
        uint32 is_trim = 2;
        NurseModel model = 3;
        NurseLevel level = 4;
        uint32 gesture = 5;
        RemindValue speed = 6;
        uint32 power = 7;
        Temperature temperature = 8;
        uint32 collagen = 9;
        uint32 methods_standard = 10;
        NurseLevel custom_ems_level_a = 11;
        NurseLevel custom_ems_level_b = 12;
        NurseLevel custom_ems_level_c = 13;
        DeviceUseState control_state = 14;
        FrequencyBand frequency_band = 15;
        uint32 current_frequency = 16;
        SwitchState music_model_switch = 17;
    }
}

message FrequencyBand {
    uint32 min_frequency = 1; // 0.8MHz : 800 KMHz
    uint32 max_frequency = 2; // 2.45MHz: 2450KMHz
}

message Temperature {
    uint32 left_temperature = 1; // FACE, EYE, EMS
    uint32 right_temperature = 2; // EMS
}

enum DeviceUseState {
    DEFAULT_ = 0;
    START_ = 1;
    PAUSE_ = 2;
    CONTINUE_ = 3;
    STOP_ = 4;
}

message DeviceUp {
    DeviceUseState device_use_state = 1;
    uint32 device_use_time = 2;
    repeated DeviceValue up_value = 3 [(nanopb).max_count = 1];
}

message DeviceRemindInfo {
    repeated DeviceValue remind_value = 1 [(nanopb).max_count = 1];
}

message DeviceReport {
    uint32 report_count = 1;
    repeated VideoReportData report_data = 2 [(nanopb).max_count = 1];
}

message VideoReportData {
    uint32 timestamp = 1;
    uint32 device_face_duration = 2;
    uint32 device_eye_duration = 3;
    uint32 device_ems_duration = 4;
    uint32 device_face_collagen = 5;
    uint32 device_eye_collagen = 6;
    uint32 device_methods_standard = 7;
}

message AudioDataInfo {
    AudioRemindType use_remind_type = 2;
    uint32 speech_id = 3;
    uint32 file_id = 4;
    ErrorCode setting_result = 100;
}

enum AudioRemindType {
    NON_REMIND = 0;
    OFFICIAL_SPEECH = 1;
    CUSTOM_SPEECH = 2;
}

//############################# 0x40 Audio/Video Linkage Service End #############################

