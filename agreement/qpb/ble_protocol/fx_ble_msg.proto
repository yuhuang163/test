enum RotaFileStatus {
    ROTA_START = 0;
    ROTA_PAUSE = 1;
    ROTA_STOP = 2;
    ROTA_RESET = 3;
    FORCE_START = 4;
}

enum RotasUpdateFile {
    UNKNOWN_TYPE = 0;
    UI_RESOURCE = 1;  //ui resource file
    BP_RESOURCE = 2; // bacterial plaque resource file
    UI_AND_FIRMWARE = 3;
    WIFI_VOICE_PACKET = 4;
    WIFI_FIRMWARE = 5;
    WIFI_THEME = 6;
}

enum RotaErrorCode {
    ROTA_SUCCESS = 0;
    GENERAL = 1;
    LOW_BATTERY = 2;
    OTA_ALREADY = 3;
    FILE_TOO_LAGER = 4;
    MD5_FAIL = 5;
    FILE_NO_SUPPORT = 6;
    FLASH_ERR = 7;
    NO_MEMORY = 8;
    TRANS_TIMEOUT = 9;
    TRANS_OVER_RANGE = 10;
    DOWNLOAD_SUCCESS = 11;
    DOWNLOAD_FAIL = 12;
    NO_NETWORK_CONFIG = 13;
    NETWORK_CONN_FAIL = 14;
    GET_FILE_INFO_FAIL = 15;
    DOWNLOAD_CHECKOUT = 16;
    INSTALL_FAIL = 17;
}

message RotasFileStatusReq {
    RotaFileStatus rotaStatus = 1;
    RotasUpdateFile fileType = 2;
    uint32 fileVersion = 3;
    uint32 fileSize = 4;
    uint32 packetNum = 5;
    uint32 packetSize = 6;
    uint32 packetIntervalRsp = 7;
    bytes file_md5 = 8 [(nanopb).max_size = 64];
    bytes file_zip_md5 = 9 [(nanopb).max_size = 64];
    uint32 fileUnzipSize = 10;
    uint32 fileWriteAddress = 11;
}

message RotasFileStatusRsp {
    RotasUpdateFile fileType = 1;
    RotaErrorCode result = 2;
    uint32 packetSize = 3;
}

message RotasDataReq {
    RotasUpdateFile fileType = 1;
    uint32 index = 2;
    bytes data = 3 [(nanopb).max_size= 240];
}

message RotasDataRsp {
    RotasUpdateFile fileType = 1;
    uint32 index = 2;
    RotaErrorCode result = 3;
    uint32 progress = 4;
}

message RotasResultReq {
    RotasUpdateFile fileType = 1;
    uint32 fileVersion = 2;
    RotaErrorCode rotaResult = 3;
}

message RotasResultRsp {
    RotasUpdateFile fileType = 1;
    RotaErrorCode result = 2;
}

