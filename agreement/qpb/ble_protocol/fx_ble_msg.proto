message ReportData {
    uint32 timestamp = 1; // 刷牙开始时间
    BrushingModel brushing_model = 2; // 刷牙模式
    uint32 brushing_power_level = 3; // 刷牙力度
    uint32 brushing_time = 4; // 刷牙停止时长
    uint32 brushing_real_time = 5; // 实际刷牙时长
    uint32 brushing_time_score = 6; // 刷牙时长总分数
    uint32 coverage_rate_score = 7; // 覆盖率总分数
    uint32 brushing_score = 8; // 刷牙总分数
    uint32 pressure_sensor_score = 9; // 压力感应总得分
    oneof add_data {
        AlgorithmReport algorithm_report = 10; // algorithm add
        SimpleReport simple_report = 11;
        AlgoResultFusion algo_result_fusion = 12;
    }
}

message AlgoResultFusion {
    bytes param_switch = 1 [(nanopb).max_size= 5]; // 全口参数开关 顺序使用SwitchType
    bytes factor_switch = 2 [(nanopb).max_size= 4]; // 区域牙模开关 顺序使用SwitchType
    uint32 time_op = 3; // 全口过压时长
    uint32 time_hb = 4; // 全口横刷时长
    uint32 plaque_residue = 5; // 全口菌斑残留
    uint32 n_area = 6; // 齿区数量
    uint32 n_facet = 7; // 齿面数量
    repeated int32 vec_time_display = 8 [(nanopb).max_count = 6]; // 区域刷牙时长呈现百分比
    repeated int32 vec_time_op_display = 9 [(nanopb).max_count = 6]; // 区域过压时长呈现百分比
    repeated int32 vec_time_hb_display = 10 [(nanopb).max_count = 6]; //区域横刷时长呈现百分比
    repeated uint32 vec_coverage = 11 [(nanopb).max_count = 6]; // 区域覆盖率
    uint32 algo_ver = 12; // 算法版本号
    uint32 protocol_ver = 13; // 协议编号
    uint32 timestamp_end = 14; // 刷牙结束时间
    repeated uint32 vec_brush_time_raw = 15 [(nanopb).max_count = 6]; // 区域刷牙时长呈现值
    repeated uint32 vec_op_time_raw  = 16 [(nanopb).max_count = 6]; // 区域过压刷牙时长呈现值
    oneof other_data {
        AlgoOtherData other_data_result = 100; // 研究数据
        bytes other_data_bytes = 101 [(nanopb).max_size= 256]; // 研究数据byte流
    }
}

message AlgoOtherData {
    repeated AlgoOtherDataResult other_data_list = 1 [(nanopb).max_count = 6];
    uint32 pause_count = 2; // 2分10秒后触发“暂停"次数
}

