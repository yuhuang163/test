    SMART = 9;
    CUSTOM_A = 10;
    MANUAL_USE = 11;
    ORTHODONTICS = 12;
    PREGNANCY = 13;
    CUSTOM_GROUP = 14;
    MOTHPROOF = 15;
}

enum BrushingPower {
    POWER_RESERVE = 0;
    LOW = 1;
    MIDDLE = 2;
    HIGH = 3;
    CUSTOM = 4;
    POWER_SMART = 5;
}

enum StatementType {
    UNKNOWN = 0;
    SDC01_USER_INFO = 1;
}

enum FillBrushState {
    NO = 0;
    YES = 1;
    DONE = 2;
}

enum DeviceColorStyle {
    DEFAULT = 0;
    BLUE = 1;
    PINK = 2;
